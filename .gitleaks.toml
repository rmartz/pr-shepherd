# gitleaks configuration for pr-shepherd
# Uses built-in gitleaks rules. Project-specific allowlists are below.

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  '''xxx@o\w+\.ingest\.sentry\.io''',
]
paths = [
  ".env.example",
  "deployment/.*\\.yml",
  # Autogenerated lockfiles — integrity hashes are high-entropy but not
  # secrets; the package manager owns these files, so exclude from scanning.
  "pnpm-lock\\.yaml",
  "package-lock\\.json",
  "yarn\\.lock",
]
