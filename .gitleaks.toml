# gitleaks configuration for pr-shepherd
# Extends the base ruleset from vercel-deploy-scripts (Firebase + Vercel patterns).
# Only project-specific allowlists belong below.

[extend]
path = "node_modules/vercel-deploy-scripts/.gitleaks.toml"

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  '''xxx@o\w+\.ingest\.sentry\.io''',
]
paths = [
  ".env.example",
  "deployment/.*\\.yml",
]
