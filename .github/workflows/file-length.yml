name: File Length

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check file lengths
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changed file lengths
        run: |
          # The hard-cap logic lives in scripts/check-file-length.mjs so this CI
          # job and the .husky/pre-commit guard share one implementation and
          # cannot drift. Compare against the merge-base so an advancing base
          # branch never skews the changed-file list.
          base=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          node scripts/check-file-length.mjs --base "$base"
