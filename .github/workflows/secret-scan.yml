name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@v3.1.0
    with:
      config-path: .gitleaks.toml
      install-deps: true
    permissions:
      contents: read
      pull-requests: write

  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
