name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@a908a7de70366a9f3a4d4ce03598715df100f0a6 # v5.2.0
    with:
      config-path: .gitleaks.toml
      install-deps: true
    permissions:
      contents: read
      pull-requests: write
