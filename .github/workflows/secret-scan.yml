name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@v3.1.0
    with:
      config-path: .gitleaks.toml
      install-deps: true
    permissions:
      contents: read
      pull-requests: write
