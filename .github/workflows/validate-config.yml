name: Validate Config

# Gated to deployment-config inputs: validate-config.mjs reads only files under
# deployment/** (schema.yml, environments.yml, {env}.yml), so its result is a pure
# function of that bounded set plus the validator script itself. A path allowlist is
# therefore safe here (unlike the test/build suite, whose failure domain is unbounded).
# If the validator is ever extended to read inputs outside deployment/**, widen the
# paths below to match.
on:
  pull_request:
    paths:
      - "deployment/**"
      - "scripts/validate-config.mjs"
  push:
    branches: [main]
    paths:
      - "deployment/**"
      - "scripts/validate-config.mjs"

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
