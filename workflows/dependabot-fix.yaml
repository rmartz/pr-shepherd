# dependabot-fix — the stripped-down child workflow a Dependabot PR forks to
# repair a CI failure.
#
# Spawned by the `dependabot-pr` workflow's `spawn_fix_pr` (fork) step when a
# Dependabot PR is CI-failing & fixable (§5.2). It is deliberately linear —
# implement the fix, review it, merge it — and does NOT re-run the full
# derive → gates lifecycle: the parent `dependabot-pr` run owns the
# classification loop and waits on this child via its `wait_fix_pr` step.
#
# Shape:  implement_fix (claude_skill) → review (claude_skill → github_api)
#         → merge (claude_skill → github_api)
#
# Capability isolation (vision §4.3) holds here exactly as in base-pr: each
# `claude_skill` step emits structured intent that its paired `github_api`
# poster carries out, and the Claude subprocess runs with GitHub credentials
# scrubbed so it physically cannot push. See docs/workflows/dependabot-fix.md.

id: dependabot-fix
version: 1
steps:
  # --- Implement the fix (claude_skill) -------------------------------------
  # Produce the fix commits on the fix-PR branch. Like every Claude skill it
  # emits structured intent only; the implement skill's branch push is the
  # one capability-isolated exception the executor permits for its own branch.
  - id: implement_fix
    stepType: claude_skill
    input:
      skill: implement-fix
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: review

  # --- Review (claude_skill → github_api) -----------------------------------
  - id: review
    stepType: claude_skill
    input:
      skill: review
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: post_review
  - id: post_review
    stepType: github_api
    input:
      actions: "{{ output.actions }}"
    routing:
      - condition: "true"
        next: merge

  # --- Merge (claude_skill → github_api) ------------------------------------
  - id: merge
    stepType: claude_skill
    input:
      skill: merge
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: post_merge
  - id: post_merge
    stepType: github_api
    input:
      actions: "{{ output.actions }}"
    routing:
      - condition: "true"
        next: null
