# base-pr — the central PR lifecycle workflow.
#
# Drives one pull request from "opened" toward "merged" (or a recorded
# parked/failed state) by re-deriving GitHub state every tick and letting the
# total gate model pick exactly one next action. See the goal-state design in
# docs/design/pr-lifecycle.md (§3–§5) and docs/workflows/base-pr.md.
#
# Shape:  derive_pr_state → evaluate_gates → { review / fix_review / merge /
#         wait_* / authorize_ci / rerun_ci / park }, with every effectful step
#         looping back to derive_pr_state. State is *derived, not stored*: a
#         stored phase is never trusted, so each cycle starts from a fresh read.
#
# Capability isolation (vision §4.3): the only steps that mutate GitHub are the
# `github_api` steps. Each `claude_skill` step (review / fix_review / merge)
# emits structured intent that its paired `github_api` step (post_review /
# post_fix_review_acks / post_merge) carries out — the Claude subprocess is
# spawned with GitHub credentials scrubbed, so it physically cannot push.
#
# Routing branches on `output.action`, the value the decision-type
# `evaluate_gates` step emits (the gate model's `Action` enum). Every Action is
# handled explicitly so no derived action falls through to a silent dead-zone;
# the trailing `condition: "true"` is the routing DSL's required catch-all.

id: base-pr
version: 1
steps:
  # --- Derive ---------------------------------------------------------------
  # One rate-limited GitHub read → the flat 8-axis state vector, written to
  # context.state. This is the head of every tick.
  - id: derive_pr_state
    stepType: derive_pr_state
    input: {}
    routing:
      - condition: "true"
        next: evaluate_gates

  # --- Decide ---------------------------------------------------------------
  # Runs the provably-total gate decision over context.state and emits
  # { action, blockingGate }. Dispatched as a decision-type step (zero cost:
  # no Claude / GitHub-API / repo slot). Each Action routes to one step.
  - id: evaluate_gates
    stepType: decision
    input:
      state: "{{ context.state }}"
    routing:
      - condition: "output.action == 'review'"
        next: review
      - condition: "output.action == 'fix_review'"
        next: fix_review
      - condition: "output.action == 'merge'"
        next: merge
      - condition: "output.action == 'wait_ci'"
        next: wait_ci
      - condition: "output.action == 'wait_copilot'"
        next: wait_copilot_review
      - condition: "output.action == 'wait_remote'"
        next: wait_author_push
      - condition: "output.action == 'authorize_ci'"
        next: authorize_ci
      - condition: "output.action == 'rerun_ci'"
        next: rerun_ci
      # A hold (draft / WIP / do-not-merge / blocked-on-issue / escalation)
      # parks the run: it ends this tick and auto-resumes next cycle when the
      # cause clears. `next: null` is the terminal route.
      - condition: "output.action == 'park'"
        next: null
      # DSL-required catch-all. A total `decide()` should never reach this, so
      # treat an unrecognized action as a park rather than a silent loop.
      - condition: "true"
        next: null

  # --- Review (claude_skill → github_api) -----------------------------------
  # Produce a verdict + intended label/review actions; the paired poster
  # performs them. The skill never touches GitHub.
  - id: review
    stepType: claude_skill
    input:
      skill: review
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: post_review
  - id: post_review
    stepType: github_api
    input:
      actions: "{{ output.actions }}"
    routing:
      - condition: "true"
        next: derive_pr_state

  # --- Fix review (claude_skill → github_api) -------------------------------
  # Push fix commits and resolve addressed threads; the poster resolves the
  # threads the skill marked addressed. Re-derive afterward.
  - id: fix_review
    stepType: claude_skill
    input:
      skill: fix-review
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: post_fix_review_acks
  - id: post_fix_review_acks
    stepType: github_api
    input:
      actions: "{{ output.actions }}"
    routing:
      - condition: "true"
        next: derive_pr_state

  # --- Waits (durable, no Claude slot) --------------------------------------
  # Each wait yields the worker until the external condition lands, then
  # re-derives so the fresh state picks the next action.
  - id: wait_ci
    stepType: wait_external
    input:
      kind: ci
      pr: "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: derive_pr_state
  - id: wait_copilot_review
    stepType: wait_external
    input:
      kind: copilot_review
      pr: "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: derive_pr_state
  - id: wait_author_push
    stepType: wait_author_push
    input:
      pr: "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: derive_pr_state

  # --- CI mutations (github_api) --------------------------------------------
  # Authorize a queued CI run, or rerun an infra-cancelled one. Both mutate
  # GitHub directly (no Claude judgment involved), then re-derive.
  - id: authorize_ci
    stepType: github_api
    input:
      actions:
        - type: authorize_ci
          params:
            repo: "{{ context.repo }}"
            pr: "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: derive_pr_state
  - id: rerun_ci
    stepType: github_api
    input:
      actions:
        - type: authorize_ci
          params:
            repo: "{{ context.repo }}"
            pr: "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: derive_pr_state

  # --- Merge (claude_skill → github_api) ------------------------------------
  # The merge skill re-validates against fresh state and emits the squash-merge
  # intent; the poster performs the serialized merge. Re-derive afterward so a
  # losing fast-forward race is observed and retried on the next tick.
  - id: merge
    stepType: claude_skill
    input:
      skill: merge
      args:
        - "{{ context.prNumber }}"
    routing:
      - condition: "true"
        next: post_merge
  - id: post_merge
    stepType: github_api
    input:
      actions: "{{ output.actions }}"
    routing:
      - condition: "true"
        next: derive_pr_state
